  <script>
    // Dynamic date
    document.addEventListener("DOMContentLoaded", function() {
      const dateElem = document.getElementById("dynamic-date");
      const now = new Date();
      dateElem.textContent = now.toLocaleDateString(navigator.language, {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    });

    // People watching random walk
    (function() {
      let count = 410;
      const min = 380;
      const countElem = document.getElementById("watching-count");

      function updateCount() {
        const upChance = Math.random();
        if (upChance < 0.65) {
          count += Math.floor(Math.random() * 8) + 1; // +1 to +8
        } else {
          count -= Math.floor(Math.random() * 3) + 1; // -1 to -3
        }
        if (count < min) count = min;
        countElem.textContent = count;

        const delay = Math.floor(Math.random() * 2000) + 1800; // 1800–3800ms
        setTimeout(updateCount, delay);
      }

      updateCount();
    })();
  </script>
