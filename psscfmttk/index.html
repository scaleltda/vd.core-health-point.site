
<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-xcod-sck
  data-utmify-prevent-subids
  async
  defer
></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    padding:0;
    font-family:'Montserrat', Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #7a0000 0%, #5a0000 40%, #2b0000 75%, #120000 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }

  .no-select{
    user-select:none;
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
  }

  .top-alert{
    width:100%;
    background:#d80d0d;
    color:#fff;
    text-align:center;
    font-size:15px;
    font-weight:800;
    padding:9px 12px;
    border-bottom:1px solid rgba(255,255,255,0.35);
    line-height:1.3;
  }

  .main{
    width:100%;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 18px 60px;
  }

  .container{
    width:100%;
    max-width:650px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .hero-link{
    display:block;
    text-decoration:none;
    margin:0 auto 18px;
  }

  .hero-img{
    display:block;
    width:100%;
    max-width:340px;
    max-height:420px;
    height:auto;
    object-fit:contain;
    border-radius:12px;
    box-shadow:0 25px 80px rgba(0,0,0,0.6);
    pointer-events:none;
  }

  .headline{
    font-size:23px;
    font-weight:800;
    line-height:1.15;
    margin:0 0 10px;
    letter-spacing:-0.7px;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .headline span{
    color:#ff2a2a;
    display:block;
  }

  .sub{
    font-size:16px;
    font-weight:700;
    line-height:1.4;
    margin:0 0 48px;
    white-space:nowrap;
  }

  .cta{
    display:flex;
    justify-content:center;
    width:100%;
  }

  .btn-ver{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    width:60%;
    background:linear-gradient(180deg,#ff1a1a,#cc0000);
    color:#ffffff;
    font-weight:700;
    font-size:17px;
    text-align:center;
    padding:16px 45px 16px 20px;
    border-radius:12px;
    text-decoration:none;
    line-height:1.18;
    box-shadow:0 8px 18px rgba(0,0,0,0.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }

  .btn-ver:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 22px rgba(0,0,0,0.45);
  }

  .btn-text{
    display:block;
    text-align:center;
  }

  .btn-arrow{
    position:absolute;
    right:18px;
    top:50%;
    width:20px;
    height:14px;
    transform:translateY(-50%);
  }

  .btn-arrow::before{
    content:"";
    position:absolute;
    left:0;
    top:50%;
    width:16px;
    height:3px;
    background:#fff;
    border-radius:10px;
    transform:translateY(-50%);
  }

  .btn-arrow::after{
    content:"";
    position:absolute;
    right:0;
    top:50%;
    width:8px;
    height:8px;
    border-top:3px solid #fff;
    border-right:3px solid #fff;
    transform:translateY(-50%) rotate(45deg);
  }

  .footer{
    width:100%;
    background:#1b191c;
    text-align:center;
    padding:25px 15px;
    font-size:13px;
    font-weight:700;
    color:#fff;
  }

  @media(max-width:480px){
    .top-alert{
      font-size:14px;
      padding:9px 10px;
      line-height:1.35;
    }

    .main{
      padding:35px 8px 75px;
      align-items:flex-start;
    }

    .container{
      max-width:100%;
    }

    .hero-link{
      margin-bottom:15px;
    }

    .hero-img{
      max-width:295px;
      max-height:380px;
    }

    .headline{
      font-size:19px;
      font-weight:800;
      line-height:1.15;
      margin-bottom:10px;
      letter-spacing:-0.7px;
      white-space:nowrap;
    }

    .sub{
      font-size:12px;
      font-weight:700;
      margin-bottom:42px;
      white-space:nowrap;
    }

    .btn-ver{
      width:60%;
      font-size:17px;
      padding:16px 45px 16px 20px;
      border-radius:12px;
      line-height:1.18;
    }

    .btn-arrow{
      right:18px;
      width:20px;
      height:14px;
    }

    .btn-arrow::before{
      width:16px;
      height:3px;
    }

    .btn-arrow::after{
      width:8px;
      height:8px;
      border-top:3px solid #fff;
      border-right:3px solid #fff;
    }

    .footer{
      font-size:12px;
      padding:22px 12px;
    }
  }
</style>
</head>

<body>

<div class="top-alert no-select">
  ⚠️ AVISO: Debido a la naturaleza sensible de este contenido, esta página saldrá del aire a medianoche del día <span id="today-date"></span>.
</div>

<main class="main">
  <div class="container no-select">

    <a href="https://vd.core-health-point.site/pvscfmttk/" class="hero-link">
      <img src="https://secretof.online/fotopre/foto_coelho2" class="hero-img" alt="">
    </a>

    <h1 class="headline">
      ESTE CONTENIDO SERÁ REMOVIDO EN <span>BREVE:</span>
    </h1>

    <p class="sub">
      ¿Confirmas que tienes +18 años para acceder a este secreto?
    </p>

    <div class="cta">
      <a href="https://vd.core-health-point.site/pvscfmttk/" class="btn-ver">
        <span class="btn-text">
          ¡VER AHORA!
        </span>
        <span class="btn-arrow"></span>
      </a>
    </div>

  </div>
</main>

<footer class="footer no-select">
  Copyright 2026 - Todos los derechos reservados.
</footer>

<script>
  const date = new Date();

  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const year = date.getFullYear();

  document.getElementById('today-date').textContent = `${day}/${month}/${year}`;
</script>

</body>
</html>
